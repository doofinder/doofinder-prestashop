name: PrestaShop Validator
on: [push]

jobs:
  prestashop-validator:
    runs-on: ubuntu-latest

    steps:
      - name: Validate module via GitHub branch
        env:
          PS_VALIDATOR_KEY: ${{ secrets.PRESTASHOP_VALIDATOR_API_KEY }}
        run: |
          RESPONSE=$(curl -s -X POST https://validator.prestashop.com/api/modules \
            -F "github_link=${{ github.repository }}" \
            -F "github_branch=${{ github.ref_name }}" \
            -F "key=$PS_VALIDATOR_KEY")

          echo "$RESPONSE"

          ERRORS=$(echo "$RESPONSE" | jq '.Details.results.errors // 0')

          # Since we are validating from the branch we will always get at least one error.
          if [ "$ERRORS" -gt 1 ]; then
            echo "❌ Validator found $((ERRORS - 1)) error/s"
            exit 1
          fi

          echo "✅ Module passed validation"
